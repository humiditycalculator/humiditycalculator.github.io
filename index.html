<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Humidity Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI";
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(180deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: flex-end;
}

/* App Card */
.app {
    width: 100%;
    max-width: 420px;
    height: 85%;
    background: #ffffff;
    border-radius: 30px 30px 0 0;
    padding: 25px;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
    animation: slideUp 0.8s ease;
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 20px;
}

.header h1 {
    margin: 0;
    font-size: 22px;
}

.header p {
    margin: 5px 0 0;
    color: #666;
    font-size: 14px;
}

/* Inputs */
.field {
    margin-top: 18px;
}

.field label {
    font-size: 14px;
    color: #555;
}

.field input {
    width: 100%;
    margin-top: 6px;
    padding: 14px;
    font-size: 18px;
    border-radius: 15px;
    border: 1px solid #ddd;
    outline: none;
}

/* Button */
button {
    width: 100%;
    margin-top: 25px;
    padding: 15px;
    border-radius: 18px;
    border: none;
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* Result */
.result {
    margin-top: 25px;
    padding: 20px;
    border-radius: 20px;
    background: #f3f6ff;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #2a5298;
    min-height: 70px;
    transition: 0.3s;
}

.footer {
    margin-top: 15px;
    text-align: center;
    font-size: 12px;
    color: #888;
}

@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}
</style>
</head>

<body>

<div class="app">
    <div class="header">
        <h1>💧 Humidity Calculator</h1>
        <p>Exact Psychrometric Method</p>
    </div>

    <div class="field">
        <label>Dry Bulb Temperature (°C)</label>
        <input type="number" id="dry">
    </div>

    <div class="field">
        <label>Wet Bulb Temperature (°C)</label>
        <input type="number" id="wet">
    </div>

    <button onclick="calculateRH()">Calculate RH</button>

    <div class="result" id="result">
        Enter temperatures
    </div>

    <div class="footer">
        Accurate • Weather-grade formula
    </div>
  <div class="creator">
    Made By : Mohammad Munaf Ahmad 
  </div>
</div>

<script>
function saturationVaporPressure(T) {
    return 6.112 * Math.exp((17.62 * T) / (243.12 + T));
}

function calculateRH() {
    const Td = parseFloat(document.getElementById("dry").value);
    const Tw = parseFloat(document.getElementById("wet").value);
    const result = document.getElementById("result");

    if (isNaN(Td) || isNaN(Tw)) {
        result.innerHTML = "❌ Enter valid values";
        return;
    }

    if (Tw > Td) {
        result.innerHTML = "❌ Wet bulb > Dry bulb";
        return;
    }

    const P = 1013; // hPa
    const es_wet = saturationVaporPressure(Tw);
    const es_dry = saturationVaporPressure(Td);
    const gamma = 0.00066 * (1 + 0.00115 * Tw) * P;
    const e = es_wet - gamma * (Td - Tw);

    let RH = (e / es_dry) * 100;
    RH = Math.min(Math.max(RH, 0), 100);

    result.innerHTML = `💧 Relative Humidity<br>${RH.toFixed(2)} %`;
}
</script>

</body>
</html>
